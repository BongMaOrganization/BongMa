version: '3.8'
services:
  bongma-server:
    image: ${DOCKERHUB_USER}/bongma-backend:latest
    ports:
      - "3005:3000"
    env_file:
      - .env
    dns:
      - 8.8.8.8
      - 1.1.1.1
    restart: always

  bongma-client:
    image: ${DOCKERHUB_USER}/bongma-frontend:latest
    ports:
      - "25566:80"
    restart: always