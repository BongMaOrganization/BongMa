map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream bongma_backend {
    server 127.0.0.1:3005;
}

upstream bongma_frontend {
    server 127.0.0.1:25566;
}

server {
    listen 80;
    server_name bongma.storyoftri.xyz;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name bongma.storyoftri.xyz;

    ssl_certificate     /etc/letsencrypt/live/bongma.storyoftri.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bongma.storyoftri.xyz/privkey.pem;

    location /socket.io/ {
        proxy_pass http://bongma_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    location /api/ {
        proxy_pass http://bongma_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://bongma_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
